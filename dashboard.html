<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ozed Trading Academy</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Ozed Academy</h2>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="modules.html">Modules</a>
      <a href="progress.html">Progress</a>
      <a href="certificates.html">Certificates</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Top Bar -->
    <header class="topbar">
      <h1>Welcome back, Trader 👋</h1>
      <div class="user">Alexander</div>
    </header>

    <!-- Cards -->
    <section class="cards">

      <div class="card">
        <h3>Progress</h3>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 35%;"></div>
        </div>
        <p>35% Completed</p>
      </div>

      <div class="card">
        <h3>Current Module</h3>
        <p>Market Structure</p>
        <button>Continue</button>
      </div>

      <div class="card">
        <h3>Completed Lessons</h3>
        <p>12 Lessons</p>
      </div>

    </section>

    <!-- Modules -->
    <section class="modules">
      <h2>Your Modules</h2>

      <div class="module-grid">

        <div class="module-card">
          <h3>Foundations</h3>
          <p>5 Lessons</p>
          <button>Start</button>
        </div>

        <div class="module-card locked">
          <h3>Market Structure</h3>
          <p>8 Lessons</p>
          <button disabled>Locked</button>
        </div>

      </div>

    </section>

  </main>

</div>

</body>
</html>
